name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/configure-pages@v5
      - run: npm ci
      - name: Fetch WakaTime stats
        run: node scripts/fetch-wakatime.mjs
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
      - run: npm run build
      - name: Clean old artifacts
        run: |
          ids=$(gh api repos/${{ github.repository }}/actions/artifacts --paginate \
            --jq '[.artifacts[] | select(.name == "github-pages") | .id] | join(" ")')
          for id in $ids; do
            gh api repos/${{ github.repository }}/actions/artifacts/$id --method DELETE
          done
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
